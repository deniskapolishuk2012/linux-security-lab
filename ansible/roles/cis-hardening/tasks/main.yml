---
- name: Install security packages
  apt:
    name:
      - auditd
      - libpam-pwquality
      - rkhunter
      - ufw
    state: present
    update_cache: yes

- name: Deploy SSH hardening config
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
  notify: restart ssh

- name: Disable cloud-init SSH override
  lineinfile:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'

- name: Deploy sysctl hardening
  template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
  notify: reload sysctl

- name: Deploy password policy
  template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf

- name: Set PASS_MAX_DAYS
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: 'PASS_MAX_DAYS   90'

- name: Set PASS_MIN_DAYS
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: 'PASS_MIN_DAYS   1'

- name: Set login banner
  copy:
    content: "Authorized access only. All activity is monitored and logged.\n"
    dest: "{{ item }}"
  loop:
    - /etc/issue
    - /etc/issue.net

- name: Deploy auditd rules
  copy:
    src: audit.rules
    dest: /etc/audit/rules.d/audit.rules
  notify: restart auditd

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

- name: Allow SSH in UFW
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Enable auditd
  systemd:
    name: auditd
    enabled: yes
    state: started
